services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
      - "51212:51212"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:farreltadashihamada99@db:5432/mydb
      - JWT_SECRET=super-secret-key
    depends_on:
      - db
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: farreltadashihamada99
      POSTGRES_DB: mydb

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

